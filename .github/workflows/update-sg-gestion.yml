name: Update Societe Generale Gestion Fund Prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NAV history
        run: |
          curl -s -X POST "https://www.societegeneralegestion.fr/product-services/fdr/share/v3/isin/QS0002907598/partner/886" \
            -H "Content-Type: application/json" \
            -A "Mozilla/5.0" \
            --data '{"fields":["navHistory"]}' \
            -o sg-vivendi-e.json

          curl -s -X POST "https://www.societegeneralegestion.fr/product-services/fdr/share/v3/isin/QS0003749379/partner/886" \
            -H "Content-Type: application/json" \
            -A "Mozilla/5.0" \
            --data '{"fields":["navHistory"]}' \
            -o sg-opus22-levier.json

          curl -s -X POST "https://www.societegeneralegestion.fr/product-services/fdr/share/v3/isin/QS0003712583/partner/886" \
            -H "Content-Type: application/json" \
            -A "Mozilla/5.0" \
            --data '{"fields":["navHistory"]}' \
            -o sg-umg-e.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sg-vivendi-e.json sg-opus22-levier.json sg-umg-e.json
          git diff --staged --quiet || git commit -m "Update Societe Generale Gestion fund prices"
          git push
