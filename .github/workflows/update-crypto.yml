name: Update Crypto Prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices
        run: |
          curl -s "https://api.kraken.com/0/public/OHLC?pair=XBTEUR&interval=1440" -o btc-test.json
          curl -s "https://api.kraken.com/0/public/OHLC?pair=ETHEUR&interval=1440" -o eth-test.json
          curl -s "https://api.kraken.com/0/public/OHLC?pair=SOLEUR&interval=1440" -o sol-test.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-test.json eth-test.json sol-test.json
          git diff --staged --quiet || git commit -m "Update crypto prices"
          git push
