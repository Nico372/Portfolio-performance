name: Update Amundi Fund Prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NAV history
        run: |
          curl -s -X POST "https://funds.amundi-ee.com/product-services/fdr/share/v3/full/2743661-4991185" \
            -H "Content-Type: application/json" \
            -A "Mozilla/5.0" \
            --data '{"fields":["navHistory"]}' \
            -o amundi-canalplus-e.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amundi-canalplus-e.json
          git diff --staged --quiet || git commit -m "Update Amundi fund prices"
          git push
